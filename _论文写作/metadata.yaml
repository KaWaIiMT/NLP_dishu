title: "《地书》图形语言的语言性量化评估——基于多维标注体系的统计分析"
title-en: "A Quantitative Language-ness Assessment of EarthScript (Di Shu): Statistical Analysis Based on a Multi-Dimensional Annotation Framework"
author:
  - name: "池长俊"
    affiliation: "人工智能与计算机学院，江南大学"
  - name: "王顺祺"
  - name: "刘棪"
  - name: "高子阳"
abstract: |
  图形符号系统（如Emoji、交通标志、UI图标）在当代数字通信中日益重要，但尚未有系统的计算框架来评估它们在多大程度上"像一种语言"。本文以徐冰《地书》为案例，提出一个多维度的"语言性"量化评估框架，涵盖频率结构、信息密度、词汇多样性、语法类别多样性、篇章结构复杂度和语义稳定性六个维度。基于708个标注文件中的46,494条语言学标注数据，对《地书》与八种自然语言语料库进行了系统对比。研究发现：（1）《地书》的词汇频率严格遵循齐夫幂律分布（R² = 0.923），但其Zipf斜率（−0.612）在数值上浅于中文自然语言（−1.35~−1.47），词频分布异常平坦，归一化熵（0.914）在所有对比语料中最高；（2）在同等语料规模下，其词汇丰富度（降采样TTR = 0.434）约为中文的3倍，但与德语（0.420）接近，统计指纹更接近屈折语而非孤立语；（3）语法类别分布呈现标点/边界标记主导（33.3%）、动词性超过名词性（1.63:1）、虚词/语法标记极度稀缺（0.9%）的三重特征；篇章结构以时间先后为主线（43.7%），复杂逻辑关系不足11%；（4）标注者间一致性分析表明，literal_gloss的Cohen's κ = 0.802（高度一致），但语法归类维度（POS-like Category, Jaccard = 0.779）的一致性低于语义内容维度——图形在"是什么意思"上比"是什么词性"更容易达成共识。综合来看，《地书》在统计结构上遵循人类语言的深层组织规律，但其词汇分布模式反映了一个缺乏语法化功能词体系的符号系统所面临的系统性约束。本文据我们所知首次为图形符号系统提供了一套可复用的多维度语言性评估方法，并将标注者间分歧重新定位为揭示符号系统固有歧义性的研究窗口。
